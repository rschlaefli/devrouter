# Copy to the REPO ROOT as `.devrouter.yml`. Proxy-only, routed over the shared
# external `devnet` network by container name (NO published host ports): the
# devcontainer owns the environment; devrouter's Traefik fronts everything on the
# shared :443 / :5432 / :6379. Many projects coexist with zero collisions.
# Full walkthrough: devrouter docs/DEVCONTAINER.md.
#
# Usage: `dev up` + `dev tls install` (creates devnet + the mkcert CA), THEN
# bring the devcontainer up (devnet is external — must pre-exist), then
# `for a in app oidc db redis; do dev app run "$a"; done`.
version: 1
devrouter:
  version: 0.0.21 # proxy + protocol: tcp requires >= 0.0.21
project:
  name: {{APP}}
apps:
  # App: https://{{APP}}.localhost -> the `{{APP}}-app` devnet alias.
  - name: app
    host: {{APP}}.localhost
    protocol: http
    runtime: proxy
    upstream: {{APP}}-app:{{APP_PORT}}

  # Local OIDC mock — shares the app container's netns, so it is reached on devnet
  # as `{{APP}}-app:{{OIDC_PORT}}`. Browser + app server both use this host as the
  # NextAuth issuer (https://oidc.{{APP}}.localhost/default). Drop if no auth.
  - name: oidc
    host: oidc.{{APP}}.localhost
    protocol: http
    runtime: proxy
    upstream: {{APP}}-app:{{OIDC_PORT}}

  # Postgres: db.{{APP}}.localhost:5432 -> `{{APP}}-db` (SNI). Connect with
  # direct-SSL so the ClientHello carries the SNI (libpq 17+): psql
  # "host=db.{{APP}}.localhost port=5432 user={{DB_USER}} password={{DB_PASS}}
  # dbname={{DB_NAME}} sslmode=require sslnegotiation=direct"  (GOTCHAS #17)
  - name: db
    host: db.{{APP}}.localhost
    protocol: tcp
    tcpProtocol: postgres
    runtime: proxy
    upstream: {{APP}}-db:5432

  # Redis: redis.{{APP}}.localhost:6379 -> `{{APP}}-redis` (SNI, TLS). Drop if no
  # Redis. redis-cli -h redis.{{APP}}.localhost -p 6379 --tls
  #   --sni redis.{{APP}}.localhost --cacert "$(mkcert -CAROOT)/rootCA.pem" PING
  - name: redis
    host: redis.{{APP}}.localhost
    protocol: tcp
    tcpProtocol: redis
    runtime: proxy
    upstream: {{APP}}-redis:6379
