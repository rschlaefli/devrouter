# Self-contained dev stack for the devcontainer.
# Intentionally does NOT extend the root docker-compose.yml: a single compose
# project directory (.devcontainer) avoids relative-path ambiguity for bind
# mounts and init scripts. (GOTCHAS #13)
#
# Routing is delegated to devrouter via the shared external `devnet` network: NO
# published host ports, so many devcontainers run at once with zero collisions.
# app/postgres/redis join devnet with stable aliases; devrouter's Traefik (also
# on devnet) routes to them BY NAME. The OIDC mock shares the app's netns, so it
# is reached on devnet as `${WORKSPACE:-{{APP}}}-app:{{OIDC_PORT}}`. `dev up` must
# run before this stack starts so `devnet` exists (external network). (GOTCHAS #11, #15)
#
# Workspace isolation: aliases use `${WORKSPACE:-{{APP}}}` so the primary checkout
# resolves to `{{APP}}-*` (unchanged), while a parallel git worktree resolves to
# `<ws>-*`. `dev workspace up <branch>` sets WORKSPACE=<ws> in the env devpod runs
# compose with; otherwise set WORKSPACE in `.devcontainer/.env` or export it. The
# `.devrouter.yml` proxy upstreams use the matching `${WORKSPACE}-app` token.
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: {{DB_USER}}
      POSTGRES_PASSWORD: {{DB_PASS}}
      POSTGRES_DB: {{DB_NAME}}
    healthcheck: # required so `up --wait` / depends_on actually waits
      test: ['CMD-SHELL', 'pg_isready -U {{DB_USER}} -d {{DB_NAME}}']
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      default: {}
      # devrouter SNI-routes db.{{APP}}.localhost:5432 to this alias.
      devnet:
        aliases: ['${WORKSPACE:-{{APP}}}-db']
    volumes:
      # Optional: mount the repo's existing init SQL (shadow DB, readonly role, ...)
      # - ../docker/init-shadow-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - pgdata:/var/lib/postgresql/data

  redis: # drop if the app doesn't use Redis
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      default: {}
      # devrouter SNI-routes redis.{{APP}}.localhost:6379 to this alias.
      devnet:
        aliases: ['${WORKSPACE:-{{APP}}}-redis']

  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true # tini PID1 reaps the dev server's zombie children (GOTCHAS #10)
    env_file:
      - devcontainer.env
    # No published ports: devrouter routes https://{{APP}}.localhost and
    # https://oidc.{{APP}}.localhost over devnet (so many projects coexist with
    # zero host-port collisions). The OIDC mock shares this container's netns, so
    # devrouter reaches it as `${WORKSPACE:-{{APP}}}-app:{{OIDC_PORT}}`.
    #
    # OIDC server-side reachability: the app validates the token issuer against
    # AUTH0_ISSUER=https://oidc.{{APP}}.localhost/default and fetches discovery/
    # token/jwks from it server-side. So that host must resolve + be reachable from
    # INSIDE this container too — map it to the host gateway (where Traefik listens
    # on :443). The server-side HTTPS fetch trusts the local mkcert CA, mounted
    # read-only and pointed to by NODE_EXTRA_CA_CERTS (devcontainer.env). Browser +
    # server thus use the SAME issuer host over verified TLS. (GOTCHAS #3, #16)
    extra_hosts:
      - 'oidc.{{APP}}.localhost:host-gateway'
    networks:
      default: {}
      devnet:
        aliases: ['${WORKSPACE:-{{APP}}}-app']
    volumes:
      - ..:/workspaces/{{APP}}:cached
      # Named volumes shadow host node_modules so Linux-native binaries
      # (Prisma engines, esbuild, sharp) aren't clobbered. (GOTCHAS #6)
      - node_modules_root:/workspaces/{{APP}}/node_modules
      # Add one per workspace package, e.g.:
      # - node_modules_app:/workspaces/{{APP}}/apps/<pkg>/node_modules
      # Local mkcert root CA (created by `dev tls install`), so the app trusts the
      # https://oidc.{{APP}}.localhost cert server-side. Override
      # DEVROUTER_MKCERT_CAROOT on non-macOS (Linux mkcert: ~/.local/share/mkcert).
      - '${DEVROUTER_MKCERT_CAROOT:-${HOME}/Library/Application Support/mkcert}/rootCA.pem:/etc/devrouter/mkcert-rootCA.pem:ro'
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Local OIDC provider (Auth0 replacement). Shares the app container's network
  # namespace so the issuer is identical from the app server (token/jwks) and the
  # host browser (authorize). Routed by devrouter at
  # https://oidc.{{APP}}.localhost/default (-> ${WORKSPACE:-{{APP}}}-app:{{OIDC_PORT}}). (GOTCHAS #3)
  oidc: # drop if the app doesn't authenticate
    image: ghcr.io/navikt/mock-oauth2-server:2.1.11
    network_mode: service:app
    depends_on:
      - app
    environment:
      SERVER_PORT: '{{OIDC_PORT}}'
      # interactiveLogin=false -> one-click auto-login. Match grant_type (NOT
      # scope) or the id_token lacks `sub`. Constant `sub` = stable user. (GOTCHAS #4,#5)
      JSON_CONFIG: >-
        {
          "interactiveLogin": false,
          "tokenCallbacks": [
            {
              "issuerId": "default",
              "requestMappings": [
                {
                  "requestParam": "grant_type",
                  "match": "*",
                  "claims": {
                    "sub": "{{ADMIN_SUB}}",
                    "email": "{{ADMIN_EMAIL}}",
                    "name": "Dev Admin",
                    "email_verified": true
                  }
                }
              ]
            }
          ]
        }

networks:
  # Created by `dev up` (devrouter). Must exist before this stack starts.
  devnet:
    external: true

volumes:
  pgdata:
  node_modules_root:
