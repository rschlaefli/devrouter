name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the current ref to npm
        required: false
        default: false
        type: boolean

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:docs-policy
      - run: pnpm check:knowledge
      - run: pnpm check
      - run: pnpm knip
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  publish:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish package
        env:
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
        run: |
          if [ "$REPOSITORY_PRIVATE" = "true" ]; then
            pnpm publish --no-git-checks --access public
          else
            pnpm publish --no-git-checks --access public --provenance
          fi
